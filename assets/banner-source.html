<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1500px;
  height: 500px;
  background: #E30A17;
  position: relative;
  overflow: hidden;
  font-family: 'Helvetica Neue', 'Arial', sans-serif;
}

.bg-shade {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.12) 100%);
}

/* Hourglass logo */
.logo {
  position: absolute;
  left: 80px; top: 80px;
  width: 140px; height: 140px;
  background: rgba(255,255,255,0.15);
  border-radius: 28px;
  display: flex; align-items: center; justify-content: center;
}

/* Title next to logo */
.title-ist {
  position: absolute;
  left: 250px; top: 82px;
  font-size: 58px; font-weight: 700;
  color: #FFFFFF; letter-spacing: 4px;
}

.title-bek {
  position: absolute;
  left: 250px; top: 148px;
  font-size: 58px; font-weight: 700;
  color: #FFFFFF; letter-spacing: 4px;
  opacity: 0.9;
}

/* Tagline - bigger and bolder */
.tagline {
  position: absolute;
  left: 80px; top: 250px;
  font-size: 22px; color: rgba(255,255,255,0.85);
  line-height: 1.5; font-weight: 500;
}

/* Date - more readable */
.dateline {
  position: absolute;
  left: 80px; top: 310px;
  font-family: 'Courier New', monospace;
  font-size: 15px; color: rgba(255,255,255,0.6);
  letter-spacing: 3px;
}

/* Divider */
.divider {
  position: absolute;
  left: 920px; top: 80px;
  width: 1px; height: 280px;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
}

/* CTA */
.cta-text {
  position: absolute;
  right: 80px; top: 120px;
  font-size: 32px; font-weight: 700;
  color: #FFFFFF;
  text-align: right; line-height: 1.35;
}

.cta-sub {
  position: absolute;
  right: 80px; top: 205px;
  font-size: 18px;
  color: rgba(255,255,255,0.7);
  text-align: right;
}

.cta-btn {
  position: absolute;
  right: 80px; top: 255px;
  padding: 14px 40px;
  background: #FFFFFF;
  color: #E30A17;
  font-size: 16px; font-weight: 700;
  letter-spacing: 2px;
  border-radius: 30px;
}

/* Bottom skyline */
.skyline {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 75px;
}

.top-line {
  position: absolute;
  bottom: 73px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 3%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0.15) 80%, transparent 97%);
}
</style>
</head>
<body>

<div class="bg-shade"></div>

<!-- Logo -->
<div class="logo">

    <path d="M15 8 L45 8 L45 12 L33 28 L33 32 L45 48 L45 52 L15 52 L15 48 L27 32 L27 28 L15 12 Z"

<div class="dateline">19 MART 2025'TEN BERİ</div>

<div class="cta-btn">TAKİP ET</div>
